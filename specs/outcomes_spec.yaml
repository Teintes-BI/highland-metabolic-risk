outcomes:
  risk_cluster:
    type: binary
    # 心代谢危险因素聚集：≥2 个阳性（血压高 / 血糖高 / 血脂异常 / 中心性肥胖）
    rule:
      kind: count_positive
      min_count: 2
      rules:
        - kind: sbp_dbp
          sbp_column: "SBP 收缩压"
          dbp_column: "DBP舒张压"
          sbp_threshold: 140
          dbp_threshold: 90
        - kind: threshold
          column: "葡萄糖-血糖mmol/L"
          operator: ">="
          threshold: 5.6
        - kind: lipid
          tg_column: "甘油三脂mmol/L(TG)"
          tc_column: "总胆固醇mmol/L(TC)"
          ldl_column: "血清低密度脂蛋白胆固醇mmol/L(LDL)"
          hdl_column: "血清高密度脂蛋白胆固醇mmol/L(HDL)"
          tg_threshold: 1.7
          tc_threshold: 6.2
          ldl_threshold: 4.1
          hdl_male_threshold: 1.04
          hdl_female_threshold: 1.3
          sex_column: "6、A4 您的性别："
          sex_male_value: "男"
          sex_female_value: "女"
        # 中心性肥胖（按性别阈值）：男≥90cm，女≥85cm
        - kind: waist_by_sex
          waist_column: "腰围（cm）"
          sex_column: "6、A4 您的性别："
          sex_male_value: "男"
          sex_female_value: "女"
          male_threshold: 90
          female_threshold: 85
  central_obesity:
    type: binary
    # 中心性肥胖（按性别阈值）：男≥90cm，女≥85cm
    rule:
      kind: waist_by_sex
      waist_column: "腰围（cm）"
      sex_column: "6、A4 您的性别："
      sex_male_value: "男"
      sex_female_value: "女"
      male_threshold: 90
      female_threshold: 85
