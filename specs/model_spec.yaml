models:
  elasticnet:
    C: [0.001, 0.01, 0.1, 1.0, 10.0, 100.0]
    l1_ratio: [0.1, 0.3, 0.5, 0.7, 0.9]
    max_iter: 8000
    class_weight: "balanced"
  ebm:
    run: true
    max_bins: [64, 128, 256]
    interactions: [0, 5, 10]
    learning_rate: [0.01, 0.02, 0.05]
    max_rounds: [500, 800]
  gam:
    run: false
    n_splines: [5, 10, 15]
    lam: [0.01, 0.1, 1.0, 10.0]
  xgboost:
    run: true
    n_estimators: [200, 400, 800]
    max_depth: [3, 4, 5, 6]
    learning_rate: [0.02, 0.05, 0.1]
    subsample: [0.7, 0.85, 1.0]
    colsample_bytree: [0.7, 0.85, 1.0]

cv:
  outer_folds: 5
  inner_folds: 3
  random_seed: 42
  # Parallelism:
  # - search_n_jobs: joblib parallelism for CV/search (Grid/RandomizedSearchCV, cross_val_predict)
  # - model_n_jobs: per-model internal parallelism (e.g., XGBoost, LogisticRegression saga)
  # Recommended: avoid oversubscription by keeping `model_n_jobs` low when `search_n_jobs` is high.
  # Default (requested): use up to 64 cores via CV/search parallelism.
  search_n_jobs: 64
  model_n_jobs: 1
  nested_search: "random"
  n_iter: 50
  stratify: true
