  # 自动全量特征（按结局 leakage_block 自动剔除同源指标；并按 exclude_columns 剔除诊断/用药等）
  ALL_NONLEAK: []

use_all_columns: true
use_all_columns_sets: ["ALL_NONLEAK"]

# 需要从真实表头填写：诊断/用药/首次诊断时间等列（只能用于定义标签，不得进入特征）
exclude_columns:
  - "32、C1 您以前是否被诊断为高血压？"
  - "34、C1.1您两周内服用降压药的情况？"
  - "44、C4 您以前是否被诊断下列疾病："
  - "45、(1)C4.1 糖尿病首次诊断时间：___"
  - "47、C4.3 您目前是否服用降糖类药物或使用胰岛素？"
  - "48、(1)C4.1 高血脂首次诊断时间：___"
  - "50、C4.3 您目前是否服用调脂类药物(他汀类、贝特类)？"
  - "高血压诊断（paper）"
  - "高血糖诊断（5.6）"
  - "血脂异常诊断（调脂药物、总胆固醇6.2，甘油三酯1.7，低高密度脂蛋白胆固醇：男小于1.04女小于1.3）"

leakage_block:
  hypertension:
    - "SBP 收缩压"
    - "DBP舒张压"
  hyperglycemia:
    - "葡萄糖-血糖mmol/L"
  dyslipidemia:
    - "甘油三脂mmol/L(TG)"
    - "总胆固醇mmol/L(TC)"
    - "血清低密度脂蛋白胆固醇mmol/L(LDL)"
    - "血清高密度脂蛋白胆固醇mmol/L(HDL)"
  central_obesity:
    - "腰围（cm）"


categorical:
  rare_level_threshold: 0.01
  other_label: "Other"
  drop_first: false
  max_levels: 50

scaling:
  standardize_numeric: true
